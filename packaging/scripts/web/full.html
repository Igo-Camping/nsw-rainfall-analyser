<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stormwater Packaging Tool</title>
  <style>
    :root {
      --bg: #edf3ea;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(18, 74, 44, 0.14);
      --ink: #163224;
      --muted: #5e7467;
      --accent: #1d6b43;
      --accent-soft: #dcecdf;
      --shadow: 0 22px 55px rgba(16, 54, 34, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(191, 141, 44, 0.11), transparent 28%),
        linear-gradient(180deg, #f7fbf5 0%, var(--bg) 100%);
    }

    .shell {
      width: min(1500px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .hero,
    .frame-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .button.primary {
      background: linear-gradient(135deg, #1d6b43, #145234);
      color: #fff;
    }

    .button.secondary {
      background: var(--accent-soft);
      color: #145234;
    }

    .frame-card {
      padding: 14px;
    }

    .frame-status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 2px 6px 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 170px);
      min-height: 820px;
      border: 0;
      border-radius: 16px;
      background: #fff;
    }

    code {
      background: rgba(29, 107, 67, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      iframe {
        height: calc(100vh - 140px);
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Stormwater Packaging Tool</p>
        <h1>Full packaging workflow on a web page</h1>
        <p>The original Streamlit tool is embedded below so none of the packaging options are lost.</p>
      </div>
      <div class="actions">
        <a class="button secondary" href="/lite">Open lightweight map preview</a>
        <a class="button primary" id="open-full-app" href="#" target="_blank" rel="noopener">Open full app in new tab</a>
      </div>
    </section>

    <section class="frame-card">
      <div class="frame-status">
        <span id="frame-status">Loading embedded Streamlit app...</span>
        <span id="frame-url"></span>
      </div>
      <iframe id="streamlit-frame" title="Stormwater Packaging Tool"></iframe>
    </section>
  </div>

  <script>
    async function init() {
      const status = document.getElementById("frame-status");
      const urlLabel = document.getElementById("frame-url");
      const frame = document.getElementById("streamlit-frame");
      const openLink = document.getElementById("open-full-app");

      try {
        const response = await fetch("/web/config");
        const config = await response.json();
        const streamlitUrl = config.streamlit_url;
        frame.src = streamlitUrl;
        openLink.href = streamlitUrl;
        urlLabel.textContent = streamlitUrl;
        status.textContent = "Embedded full-feature app";
      } catch (error) {
        status.textContent = "Unable to load the embedded app configuration.";
        urlLabel.textContent = "";
      }
    }

    init();
  </script>
</body>
</html>
