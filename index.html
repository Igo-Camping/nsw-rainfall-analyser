<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self'; img-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
  >
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta
    name="description"
    content="Pluviometrics is the product hub for rainfall intelligence, stormwater analysis, and engineering-grade weather tools."
  >
  <title>Pluviometrics</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="hub-shell">
    <section class="hub-hero" aria-labelledby="page-title">
      <div class="hub-brand">
        <img
          class="hub-brand__logo"
          src="Assets/Logos/PLUVIOMETRICS.png"
          alt="Pluviometrics"
          width="520"
          height="160"
        >
      </div>

      <div class="hub-intro">
        <p class="hub-kicker">Product hub</p>
        <h1 id="page-title">Pluviometrics</h1>
        <p>
          Engineering-grade rainfall and stormwater intelligence products for analysis, planning, and operational decision-making.
        </p>
      </div>
    </section>

    <section class="product-grid" aria-label="Pluviometrics products">
      <a class="product-card" href="https://atmos.pluviometrics.com.au">
        <img
          class="product-card__logo"
          src="Assets/Logos/ATMOS.png"
          alt="Pluvio Atmos"
          width="360"
          height="180"
        >
        <span class="product-card__meta">Rainfall analysis</span>
        <span class="product-card__link">Open Atmos</span>
      </a>

      <a class="product-card" href="https://stormgauge.pluviometrics.com.au">
        <img
          class="product-card__logo"
          src="Assets/Logos/STORMGAUGE.png"
          alt="Stormgauge"
          width="360"
          height="180"
        >
        <span class="product-card__meta">Stormwater intelligence</span>
        <span class="product-card__link">Open Stormgauge</span>
      </a>
    </section>
  </main>
</body>
</html>
